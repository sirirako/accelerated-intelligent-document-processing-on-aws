# =============================================================================
# RBAC: Role-Based Access Control via @aws_auth(cognito_groups: [...])
#
# Roles (Cognito Groups):
#   Admin    - Full access to all operations
#   Author   - Read + write (documents, configuration, tests, discovery)
#   Reviewer - HITL review operations + limited document list
#   Viewer   - Read-only access to documents, config, agent chat
#
# Backend (IAM) operations: createDocument, updateDocument, updateDocumentStatus,
#   updateDocumentSection, updateAgentJobStatus, updateDiscoveryJobStatus
#   These are only callable by backend Lambda functions via IAM auth.
# =============================================================================

type Mutation {
  # Backend-only operations (IAM auth - called by Step Functions / Lambda)
  createDocument(input: CreateDocumentInput!): CreateDocumentOutput @aws_iam
  updateDocument(input: UpdateDocumentInput!): Document @aws_iam
  updateDocumentStatus(input: UpdateDocumentStatusInput!): Document @aws_iam
  updateDocumentSection(input: UpdateDocumentSectionInput!): Document @aws_iam
  updateAgentJobStatus(
    jobId: ID!
    status: String!
    userId: String!
    result: String
  ): Boolean @aws_iam
  updateDiscoveryJobStatus(
    jobId: ID!
    status: String!
    errorMessage: String
    discoveredClassName: String
    statusMessage: String
  ): DiscoveryJob @aws_iam

  # Admin-only operations
  deleteConfigVersion(versionName: String!): UpdateConfigurationResponse
    @aws_auth(cognito_groups: ["Admin"])
  createUser(email: String!, persona: String!, allowedConfigVersions: [String]): User
    @aws_auth(cognito_groups: ["Admin"])
  updateUser(userId: ID!, allowedConfigVersions: [String]): User
    @aws_auth(cognito_groups: ["Admin"])
  deleteUser(userId: ID!): Boolean
    @aws_auth(cognito_groups: ["Admin"])

  # Admin + Author operations
  deleteDocument(objectKeys: [String!]!): Boolean!
    @aws_auth(cognito_groups: ["Admin", "Author"])
  updateConfiguration(versionName: String!, customConfig: AWSJSON!, description: String): UpdateConfigurationResponse
    @aws_auth(cognito_groups: ["Admin", "Author"])
  setActiveVersion(versionName: String!): UpdateConfigurationResponse
    @aws_auth(cognito_groups: ["Admin", "Author"])
  syncBdaIdp(direction: String, versionName: String, bdaProjectArn: String, saveArn: Boolean, syncMode: String): SyncBdaIdpResponse
    @aws_auth(cognito_groups: ["Admin", "Author"])
  updatePricing(pricingConfig: AWSJSON!): UpdatePricingResponse
    @aws_auth(cognito_groups: ["Admin"])
  restoreDefaultPricing: UpdatePricingResponse
    @aws_auth(cognito_groups: ["Admin"])
  uploadDocument(
    fileName: String!
    contentType: String
    prefix: String
    bucket: String
    version: String
  ): PresignedUrlResponse!
    @aws_auth(cognito_groups: ["Admin", "Author"])
  deleteDiscoveryJob(jobId: ID!): Boolean!
    @aws_auth(cognito_groups: ["Admin", "Author"])
  uploadDiscoveryDocument(
    fileName: String!
    contentType: String
    prefix: String
    bucket: String
    groundTruthFileName: String
    version: String
    pageRanges: [String]
    pageLabels: [String]
  ): DisPresignedUrlResponse!
    @aws_auth(cognito_groups: ["Admin", "Author"])
  autoDetectSections(
    documentKey: String!
    bucket: String!
    version: String
  ): String
    @aws_auth(cognito_groups: ["Admin", "Author"])
  copyToBaseline(objectKey: String!): CopyToBaselineResponse!
    @aws_auth(cognito_groups: ["Admin", "Author"])
  reprocessDocument(objectKeys: [String!]!, version: String): Boolean!
    @aws_auth(cognito_groups: ["Admin", "Author"])
  abortWorkflow(objectKeys: [String!]!): AbortWorkflowResponse!
    @aws_auth(cognito_groups: ["Admin", "Author"])
  startTestRun(input: TestRunInput!): TestRun
    @aws_auth(cognito_groups: ["Admin", "Author"])
  deleteTests(testRunIds: [String!]!): Boolean!
    @aws_auth(cognito_groups: ["Admin", "Author"])
  addTestSet(name: String!, description: String, filePattern: String!, bucketType: String!, fileCount: Int!): TestSet
    @aws_auth(cognito_groups: ["Admin", "Author"])
  addTestSetFromUpload(input: TestSetUploadInput!): TestSetUploadResponse
    @aws_auth(cognito_groups: ["Admin", "Author"])
  deleteTestSets(testSetIds: [String!]!): Boolean!
    @aws_auth(cognito_groups: ["Admin", "Author"])

  # Admin + Reviewer operations (HITL review workflow)
  processChanges(
    objectKey: String!
    modifiedSections: [ModifiedSectionInput!]!
    modifiedPages: [ModifiedPageInput!]
  ): ProcessChangesResponse!
    @aws_auth(cognito_groups: ["Admin", "Reviewer"])
  completeSectionReview(objectKey: String!, sectionId: String!, editedData: AWSJSON): Document
    @aws_auth(cognito_groups: ["Admin", "Reviewer"])
  skipAllSectionsReview(objectKey: String!): Document
    @aws_auth(cognito_groups: ["Admin", "Reviewer"])
  claimReview(objectKey: String!): Document
    @aws_auth(cognito_groups: ["Admin", "Reviewer"])
  releaseReview(objectKey: String!): Document
    @aws_auth(cognito_groups: ["Admin", "Reviewer"])

  # Agent Chat operations (all authenticated Cognito users + IAM for backend)
  # Note: Reviewer exclusion from Agent Chat is enforced at the QUERY level —
  # all supporting queries (listChatSessions, getChatMessages, listAvailableAgents)
  # have @aws_auth directives excluding Reviewer. The mutations use @aws_cognito_user_pools
  # because @aws_auth + @aws_iam is not supported on the same field in AppSync.
  sendAgentChatMessage(
    prompt: String!
    sessionId: String
    method: String
    enableCodeIntelligence: Boolean
    toolMetadata: ToolMetadataInput
  ): AgentChatMessage
    @aws_cognito_user_pools
    @aws_iam
  updateAgentChatMessage(sessionId: ID!, content: String!): AgentChatMessage
    @aws_cognito_user_pools
    @aws_iam
  deleteChatSession(sessionId: ID!): Boolean
    @aws_cognito_user_pools
    @aws_iam
  updateChatSessionTitle(sessionId: ID!, title: String!): ChatSession
    @aws_cognito_user_pools
    @aws_iam
  deleteAgentJob(jobId: ID!): Boolean
    @aws_cognito_user_pools
}

