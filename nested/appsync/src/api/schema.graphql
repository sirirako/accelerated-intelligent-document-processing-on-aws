  Documents: [Document]
  nextToken: String
}

type DocumentCount @aws_cognito_user_pools @aws_iam {
  count: Int!
}

# RBAC for Queries:
# Most queries are open to all authenticated users, with server-side filtering in Lambda resolvers
# (e.g., reviewer document filtering, config-version scoping). Feature-specific queries that should
# not be accessible to Reviewer role are restricted via @aws_auth directives at the field level.
# Document queries remain open to all roles (filtering is done server-side in resolvers).
type Query @aws_cognito_user_pools @aws_iam {
  # Document queries - all authenticated users (reviewer filtering done in resolver)
  getDocument(ObjectKey: ID!): Document
  listDocuments(
    startDateTime: AWSDateTime
    endDateTime: AWSDateTime
    limit: Int
    nextToken: String
  ): DocumentPage
  getDocumentCount(
    startDateTime: AWSDateTime
    endDateTime: AWSDateTime
  ): DocumentCount
  listDocumentsDateHour(date: AWSDate, hour: Int): DocumentList
  listDocumentsDateShard(date: AWSDate, shard: Int): DocumentList
  listDocumentsByDateRange(
    startDateTime: AWSDateTime!
    endDateTime: AWSDateTime!
    limit: Int
    nextToken: String
  ): DocumentPage
  getFileContents(s3Uri: String!): FileContentsResponse
  getStepFunctionExecution(executionArn: String!): StepFunctionExecutionResponse

  # Configuration & pricing queries - Admin, Author, Viewer (not Reviewer)
  getConfigVersions: ConfigurationVersionsResponse
    @aws_auth(cognito_groups: ["Admin", "Author", "Viewer"])
  getConfigVersion(versionName: String!): ConfigurationResponse
    @aws_auth(cognito_groups: ["Admin", "Author", "Viewer"])
  getPricing: PricingResponse
    @aws_auth(cognito_groups: ["Admin", "Author", "Viewer"])
  calculateCapacity(input: String!): CapacityResult
    @aws_auth(cognito_groups: ["Admin", "Author", "Viewer"])

  # Agent Chat & Code Explorer queries
  # Note: These need both Cognito and IAM auth (for return type resolution).
  # AppSync does not support @aws_auth(cognito_groups:[...]) + @aws_iam on the same field.
  # Reviewer exclusion is enforced by UI navigation (Agent Chat hidden for Reviewer)
  # and session scoping (users only see their own sessions).
  listAvailableAgents: [Agent] @aws_cognito_user_pools @aws_iam
  getAgentChatMessages(sessionId: ID!): [AgentChatMessage] @aws_cognito_user_pools @aws_iam
  listChatSessions(limit: Int, nextToken: String): ChatSessionConnection @aws_cognito_user_pools @aws_iam
  getChatMessages(sessionId: ID!): [AgentChatMessage] @aws_cognito_user_pools @aws_iam

  # Knowledge base & document chat queries
  queryKnowledgeBase(input: String!, sessionId: String): String
  chatWithDocument(
    s3Uri: String!
    prompt: String!
    history: AWSJSON!
    modelId: String!
  ): String

  # Discovery queries - Admin, Author only
  listDiscoveryJobs: DiscoveryJobList
    @aws_auth(cognito_groups: ["Admin", "Author"])

  # Agent query system - Admin, Author, Viewer (not Reviewer)
  submitAgentQuery(query: String!, agentIds: [String!]!): AgentJob
    @aws_auth(cognito_groups: ["Admin", "Author", "Viewer"])
  getAgentJobStatus(jobId: ID!): AgentJob
    @aws_auth(cognito_groups: ["Admin", "Author", "Viewer"])
  listAgentJobs(limit: Int, nextToken: String): AgentJobConnection
    @aws_auth(cognito_groups: ["Admin", "Author", "Viewer"])

  # Test Studio queries - Admin, Author only
  getTestRun(testRunId: String!): TestRun
    @aws_auth(cognito_groups: ["Admin", "Author"])
  getTestRuns(timePeriodHours: Int, startDateTime: AWSDateTime, endDateTime: AWSDateTime): [TestRun]
    @aws_auth(cognito_groups: ["Admin", "Author"])
  getTestRunStatus(testRunId: String!): TestRunStatus
    @aws_auth(cognito_groups: ["Admin", "Author"])
  compareTestRuns(testRunIds: [String!]!): TestRunComparison
    @aws_auth(cognito_groups: ["Admin", "Author"])
  getTestSets: [TestSet]
    @aws_auth(cognito_groups: ["Admin", "Author"])
  listBucketFiles(bucketType: String!, filePattern: String!): [String]
    @aws_auth(cognito_groups: ["Admin", "Author"])
  validateTestFileName(fileName: String!): TestSetValidationResponse
    @aws_auth(cognito_groups: ["Admin", "Author"])

  # Configuration Library queries - Admin, Author, Viewer (not Reviewer)
  listConfigurationLibrary(pattern: String!): ConfigurationLibraryResponse
    @aws_auth(cognito_groups: ["Admin", "Author", "Viewer"])
  getConfigurationLibraryFile(
    pattern: String!
    configName: String!
    fileName: String!
  ): ConfigurationLibraryFileResponse
    @aws_auth(cognito_groups: ["Admin", "Author", "Viewer"])

  # User Management queries
  listUsers: UserList @aws_cognito_user_pools
  getMyProfile: User @aws_cognito_user_pools
}

type Subscription @aws_cognito_user_pools @aws_iam {
  onCreateDocument: CreateDocumentOutput
    @aws_subscribe(mutations: ["createDocument"])
