AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Sample Lambda Hook functions for GenAI IDP Accelerator's LambdaHook custom inference feature.
  Deploy these to test and illustrate the LambdaHook integration pattern.

Parameters:
  IDPWorkingBucket:
    Type: String
    Description: >
      Name of the IDP stack's working S3 bucket. Required for reading images
      that are uploaded as S3 references in the LambdaHook payload.

  TargetModelId:
    Type: String
    Default: "us.amazon.nova-pro-v1:0"
    Description: Bedrock model ID for the bedrock-proxy sample function.

  SageMakerEndpointName:
    Type: String
    Default: ""
    Description: >
      SageMaker endpoint name for the sagemaker-hook sample function.
      Leave empty if not using the SageMaker sample.

  ChandraApiKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: >
      Datalab API key for the Chandra OCR hook sample function.
      Get your key from https://www.datalab.to
      Leave empty if not using the Chandra sample.

  ChandraApiUrl:
    Type: String
    Default: "https://www.datalab.to"
    Description: Datalab API base URL.

  ChandraOutputFormat:
    Type: String
    Default: "markdown"
    AllowedValues:
      - markdown
      - json
      - html
    Description: Output format for Chandra OCR results.

  ChandraConversionMode:
    Type: String
    Default: "accurate"
    AllowedValues:
      - fast
      - balanced
      - accurate
    Description: >
      Conversion quality mode. 'fast' for lowest latency, 'accurate' for highest quality.

Resources:
  # =========================================================================
  # GENAIIDP-bedrock-proxy
  # Forwards LambdaHook payloads to Amazon Bedrock Converse API
  # =========================================================================
  BedrockProxyFunction:
    Type: AWS::Serverless::Function
    # checkov:skip=CKV_AWS_173: "Environment variables contain non-sensitive configuration values (model ID and log level)"
    # checkov:skip=CKV_AWS_116: "DLQ not required for sample Lambda hook function - errors handled by IDP pipeline"
    # checkov:skip=CKV_AWS_117: "Function does not require VPC access as it only interacts with AWS services via APIs"
    # checkov:skip=CKV_AWS_115: "Function does not require reserved concurrency - sample function for demonstration purposes"
    Properties:
      FunctionName: GENAIIDP-bedrock-proxy
      Runtime: python3.12
      Handler: index.lambda_handler
      CodeUri: GENAIIDP-bedrock-proxy/
      Timeout: 300
      MemorySize: 512
      Environment:
        Variables:
          TARGET_MODEL_ID: !Ref TargetModelId
          LOG_LEVEL: INFO
      Policies:
        - Statement:
            # Read images from IDP working bucket
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource:
                - !Sub "arn:${AWS::Partition}:s3:::${IDPWorkingBucket}/temp/lambdahook/*"
            # Invoke Bedrock models
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
                - bedrock:GetInferenceProfile
              Resource:
                - !Sub "arn:${AWS::Partition}:bedrock:*::foundation-model/*"
                - !Sub "arn:${AWS::Partition}:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/*"
                - !Sub "arn:${AWS::Partition}:bedrock:${AWS::Region}:${AWS::AccountId}:application-inference-profile/*"

  # =========================================================================
  # GENAIIDP-sagemaker-hook
  # Forwards LambdaHook payloads to a SageMaker real-time inference endpoint
  # =========================================================================
  SageMakerHookFunction:
    Type: AWS::Serverless::Function
    # checkov:skip=CKV_AWS_173: "Environment variables contain non-sensitive configuration values (endpoint name and log level)"
    # checkov:skip=CKV_AWS_116: "DLQ not required for sample Lambda hook function - errors handled by IDP pipeline"
    # checkov:skip=CKV_AWS_117: "Function does not require VPC access as it only interacts with AWS services via APIs"
    # checkov:skip=CKV_AWS_115: "Function does not require reserved concurrency - sample function for demonstration purposes"
    Properties:
      FunctionName: GENAIIDP-sagemaker-hook
      Runtime: python3.12
      Handler: index.lambda_handler
      CodeUri: GENAIIDP-sagemaker-hook/
      Timeout: 300
      MemorySize: 512
      Environment:
        Variables:
          SAGEMAKER_ENDPOINT_NAME: !Ref SageMakerEndpointName
          LOG_LEVEL: INFO
      Policies:
        - Statement:
            # Read images from IDP working bucket
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource:
                - !Sub "arn:${AWS::Partition}:s3:::${IDPWorkingBucket}/temp/lambdahook/*"
            # Invoke SageMaker endpoint
            - Effect: Allow
              Action:
                - sagemaker:InvokeEndpoint
              Resource:
                - !Sub "arn:${AWS::Partition}:sagemaker:${AWS::Region}:${AWS::AccountId}:endpoint/*"

  # =========================================================================
  # GENAIIDP-chandra-ocr-hook
  # Calls the Chandra OCR 2 hosted API for high-quality OCR
  # =========================================================================
  ChandraOcrHookFunction:
    Type: AWS::Serverless::Function
    # checkov:skip=CKV_AWS_173: "API key is passed via NoEcho parameter, encrypted at rest by Lambda service"
    # checkov:skip=CKV_AWS_116: "DLQ not required for sample Lambda hook function - errors handled by IDP pipeline"
    # checkov:skip=CKV_AWS_117: "Function does not require VPC access as it calls an external HTTPS API"
    # checkov:skip=CKV_AWS_115: "Function does not require reserved concurrency - sample function for demonstration purposes"
    Properties:
      FunctionName: GENAIIDP-chandra-ocr-hook
      Runtime: python3.12
      Handler: index.lambda_handler
      CodeUri: GENAIIDP-chandra-ocr-hook/
      Timeout: 300
      MemorySize: 512
      Environment:
        Variables:
          CHANDRA_API_KEY: !Ref ChandraApiKey
          CHANDRA_API_URL: !Ref ChandraApiUrl
          OUTPUT_FORMAT: !Ref ChandraOutputFormat
          CONVERSION_MODE: !Ref ChandraConversionMode
          POLL_INTERVAL: "3"
          MAX_POLL_ATTEMPTS: "60"
          LOG_LEVEL: INFO
      Policies:
        - Statement:
            # Read images from IDP working bucket
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource:
                - !Sub "arn:${AWS::Partition}:s3:::${IDPWorkingBucket}/temp/lambdahook/*"

Outputs:
  BedrockProxyFunctionArn:
    Description: ARN of the Bedrock proxy Lambda hook function
    Value: !GetAtt BedrockProxyFunction.Arn

  SageMakerHookFunctionArn:
    Description: ARN of the SageMaker Lambda hook function
    Value: !GetAtt SageMakerHookFunction.Arn

  ChandraOcrHookFunctionArn:
    Description: ARN of the Chandra OCR Lambda hook function
    Value: !GetAtt ChandraOcrHookFunction.Arn

  BedrockProxyUsage:
    Description: How to use the Bedrock proxy in IDP configuration
    Value: !Sub |
      Set model to "LambdaHook" and model_lambda_hook_arn to "${BedrockProxyFunction.Arn}"

  SageMakerHookUsage:
    Description: How to use the SageMaker hook in IDP configuration
    Value: !Sub |
      Set model to "LambdaHook" and model_lambda_hook_arn to "${SageMakerHookFunction.Arn}"

  ChandraOcrHookUsage:
    Description: How to use the Chandra OCR hook in IDP configuration
    Value: !Sub |
      Set OCR backend to "bedrock", model_id to "LambdaHook", and model_lambda_hook_arn to "${ChandraOcrHookFunction.Arn}"
