# Adaptive Table Extraction Configuration
#
# This configuration automatically adapts to documents of ANY size:
# - Small tables (< 50 rows): Standard extraction with tool available
# - Medium tables (50-99 rows): Recommended to use tool
# - Medium-large tables (100-499 rows): Strongly recommended / explicit instructions
# - Large tables (500+ rows): Mandatory / critical instructions
#
# NO NEED to set specific minItems values - the system automatically
# detects table size from OCR and adjusts agent instructions accordingly.

use_bda: false
notes: "Adaptive configuration for tables of any size - works for documents with 10 to 10,000+ rows"

# OCR Configuration
ocr:
  backend: textract
  features:
    - name: TABLES    # Essential for Markdown table detection
    - name: LAYOUT    # Helps preserve table structure across pages

# Classification (optional - skip if document type known)
classification:
  skip: true

# Extraction Configuration
extraction:
  # Use Claude Sonnet 4 for best agentic performance
  model: "us.anthropic.claude-sonnet-4-20250514-v1:0"

  # Temperature 0 for deterministic extraction
  temperature: 0.0

  # Use model maximum for large documents
  max_tokens: 64000

  # Agentic extraction with adaptive table parsing
  agentic:
    enabled: true

    # Table parsing configuration - adaptive to any document size
    table_parsing:
      enabled: true                      # CRITICAL: Enable deterministic parser

      # Robustness settings (work for any document size)
      max_empty_line_gap: 3              # Tolerate page breaks and OCR noise
      auto_merge_adjacent_tables: true   # Auto-merge table fragments from page splits

      # Quality thresholds (Textract-specific, optional)
      min_confidence_threshold: 95.0     # OCR confidence target
      min_parse_success_rate: 0.90       # Parse quality threshold
      use_confidence_data: true          # Use Textract confidence data

# Document Classes - NO specific minItems required!
classes:
  - $schema: https://json-schema.org/draft/2020-12/schema
    $id: FlexibleDocument
    type: object
    x-aws-idp-document-type: FlexibleDocument
    description: "Generic document that adapts to any table size"

    properties:
      document_name:
        type: string
        description: "Name or title of the document"

      table_data:
        type: array
        # NO minItems constraint - system adapts automatically!
        # System will detect actual table size from OCR and adjust instructions
        description: "Tabular data - automatically adapts to any size (10 to 10,000+ rows)"
        items:
          type: object
          properties:
            # Define your table columns here
            column1:
              type: string
              description: "First column"
            column2:
              type: number
              description: "Second column"
            # Add more columns as needed...

      summary:
        type: string
        description: "Document summary or notes"

# How It Works:
# ===============
#
# 1. OCR Analysis (Automatic):
#    - System scans OCR text for Markdown table lines (| delimiters)
#    - Counts estimated rows: e.g., 250 rows detected
#
# 2. Recommendation Strength (Automatic):
#    - 50-99 rows  → RECOMMENDED (gentle guidance)
#    - 100-499 rows → STRONGLY_RECOMMENDED (explicit instructions)
#    - 500+ rows   → MANDATORY (critical, must use tool)
#
# 3. Agent Instructions (Automatic):
#    - For 500+ rows: "CRITICAL - MANDATORY TABLE PARSING TOOL USAGE..."
#    - For 100-499 rows: "IMPORTANT - USE TABLE PARSING TOOL..."
#    - For 50-99 rows: "RECOMMENDED - TABLE PARSING TOOL..."
#
# 4. Extraction (Automatic):
#    - Agent receives appropriate instructions based on detected size
#    - Uses parse_table tool when recommended
#    - Extracts all rows regardless of document length
#
# 5. Validation (Automatic):
#    - System checks if tool was used as expected
#    - Reports completeness in processing report
#    - Alerts user if extraction incomplete
#
# Benefits:
# =========
# - ✅ Works for ANY document size (10 to 10,000+ rows)
# - ✅ No need to know table size in advance
# - ✅ Automatically scales instructions based on document
# - ✅ Single config handles all your documents
# - ✅ Clear diagnostics when issues occur
#
# Example Use Cases:
# ==================
# - Invoice with 10 line items → Standard extraction (tool available)
# - Bank statement with 75 transactions → Tool recommended
# - Transaction log with 250 entries → Tool strongly recommended (explicit instructions)
# - Brokerage statement with 1,500 holdings → Tool mandatory (critical instructions)
# - Inventory list with 10,000 SKUs → Tool mandatory, handles multi-page table
#
# All with the SAME configuration file!
