name: Deploy Documentation to GitHub Pages

on:
  push:
    branches: [main, develop]
    paths:
      - 'docs/**'
      - 'docs-site/**'
      - 'images/**'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install dependencies
        working-directory: docs-site
        run: npm ci

      - name: Setup symlinks
        working-directory: docs-site
        run: |
          # Create symlinks for doc content (same as setup.sh but with correct paths)
          mkdir -p src/content/docs
          for md_file in ../docs/*.md; do
            filename=$(basename "$md_file")
            [ "$filename" = "README.md" ] && continue
            ln -sf "../../../../docs/$filename" "src/content/docs/$filename"
          done

          # Symlink images for relative path resolution
          ln -sf ../../../images src/content/images

          # Symlink images for public serving
          mkdir -p public
          ln -sf ../../images public/images

      - name: Build documentation site
        working-directory: docs-site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
