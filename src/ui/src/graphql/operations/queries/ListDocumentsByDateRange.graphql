query ListDocumentsByDateRange($startDateTime: AWSDateTime!, $endDateTime: AWSDateTime!, $limit: Int, $nextToken: String) {
  listDocumentsByDateRange(startDateTime: $startDateTime, endDateTime: $endDateTime, limit: $limit, nextToken: $nextToken) {
    Documents {
      PK
      SK
      ObjectKey
      ObjectStatus
      InitialEventTime
      QueuedTime
      WorkflowStartTime
      CompletionTime
      WorkflowExecutionArn
      WorkflowStatus
      PageCount
      Sections {
        Id
        PageIds
        Class
        OutputJSONUri
        ConfidenceThresholdAlerts {
          attributeName
          confidence
          confidenceThreshold
        }
      }
      Pages {
        Id
        Class
        ImageUri
        TextUri
        TextConfidenceUri
      }
      EvaluationReportUri
      EvaluationStatus
      SummaryReportUri
      RuleValidationResultUri
      ExpiresAfter
      HITLStatus
      HITLReviewURL
      HITLTriggered
      HITLCompleted
      HITLSectionsPending
      HITLSectionsCompleted
      HITLSectionsSkipped
      HITLReviewOwner
      HITLReviewOwnerEmail
      HITLReviewedBy
      HITLReviewedByEmail
      TraceId
    }
    nextToken
  }
}
