query GetStepFunctionExecution($executionArn: String!) {
  getStepFunctionExecution(executionArn: $executionArn) {
    executionArn
    status
    startDate
    stopDate
    input
    output
    error
    steps {
      name
      type
      status
      startDate
      stopDate
      input
      output
      error
      mapIterations
      mapIterationDetails {
        name
        type
        status
        startDate
        stopDate
        input
        output
        error
      }
    }
  }
}
