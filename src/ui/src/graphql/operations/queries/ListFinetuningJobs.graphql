query ListFinetuningJobs($limit: Int, $nextToken: String) {
  listFinetuningJobs(limit: $limit, nextToken: $nextToken) {
    items {
      jobId
      jobName
      status
      baseModelId
      customModelName
      testSetId
      testSetName
      createdAt
      updatedAt
      completedAt
      errorMessage
      trainingMetrics
      deploymentId
      deploymentStatus
      deploymentEndpoint
    }
    nextToken
  }
}