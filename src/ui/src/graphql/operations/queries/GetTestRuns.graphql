query GetTestRuns($timePeriodHours: Int, $startDateTime: AWSDateTime, $endDateTime: AWSDateTime) {
  getTestRuns(timePeriodHours: $timePeriodHours, startDateTime: $startDateTime, endDateTime: $endDateTime) {
    testRunId
    testSetId
    testSetName
    status
    filesCount
    createdAt
    completedAt
    context
    configVersion
  }
}
