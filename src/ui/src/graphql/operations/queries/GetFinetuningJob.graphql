query GetFinetuningJob($jobId: ID!) {
  getFinetuningJob(jobId: $jobId) {
    jobId
    jobName
    status
    baseModelId
    customModelName
    customModelArn
    testSetId
    testSetName
    createdAt
    updatedAt
    completedAt
    errorMessage
    trainingMetrics
    hyperparameters
    trainingDataConfig
    validationDataConfig
    outputDataConfig
    deploymentId
    deploymentStatus
    deploymentEndpoint
    provisionedModelArn
  }
}