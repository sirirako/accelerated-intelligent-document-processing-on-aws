query GetDocument($objectKey: ID!) {
  getDocument(ObjectKey: $objectKey) {
    ObjectKey
    ObjectStatus
    InitialEventTime
    QueuedTime
    WorkflowStartTime
    CompletionTime
    WorkflowExecutionArn
    WorkflowStatus
    PageCount
    Sections {
      Id
      PageIds
      Class
      OutputJSONUri
      ConfidenceThresholdAlerts {
        attributeName
        confidence
        confidenceThreshold
      }
    }
    Pages {
      Id
      Class
      ImageUri
      TextUri
      TextConfidenceUri
    }
    Metering
    EvaluationReportUri
    EvaluationStatus
    SummaryReportUri
    RuleValidationResultUri
    ExpiresAfter
    HITLStatus
    HITLTriggered
    HITLReviewURL
    HITLSectionsPending
    HITLSectionsCompleted
    HITLSectionsSkipped
    HITLReviewOwner
    HITLReviewOwnerEmail
    HITLReviewedBy
    HITLReviewedByEmail
    HITLReviewHistory
    ConfigVersion
    HITLCompleted
    TraceId
  }
}
