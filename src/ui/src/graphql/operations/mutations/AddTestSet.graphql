mutation AddTestSet($name: String!, $description: String, $filePattern: String!, $bucketType: String!, $fileCount: Int!, $modifiedAfter: String) {
  addTestSet(name: $name, description: $description, filePattern: $filePattern, bucketType: $bucketType, fileCount: $fileCount, modifiedAfter: $modifiedAfter) {
    id
    name
    description
    filePattern
    fileCount
    createdAt
  }
}
