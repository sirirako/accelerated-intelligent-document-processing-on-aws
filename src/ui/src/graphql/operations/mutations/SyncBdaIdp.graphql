mutation SyncBdaIdp(
  $direction: String,
  $versionName: String,
  $bdaProjectArn: String,
  $saveArn: Boolean,
  $syncMode: String
) {
  syncBdaIdp(
    direction: $direction,
    versionName: $versionName,
    bdaProjectArn: $bdaProjectArn,
    saveArn: $saveArn,
    syncMode: $syncMode
  ) {
    success
    message
    processedClasses
    direction
    bdaProjectArn
    bdaSyncStatus
    error {
      type
      message
    }
  }
}
