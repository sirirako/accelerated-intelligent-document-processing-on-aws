mutation CompleteSectionReview($objectKey: String!, $sectionId: String!, $editedData: AWSJSON) {
  completeSectionReview(objectKey: $objectKey, sectionId: $sectionId, editedData: $editedData) {
    ObjectKey
    ObjectStatus
    HITLStatus
    HITLSectionsPending
    HITLSectionsCompleted
    HITLSectionsSkipped
    HITLReviewHistory
  }
}
