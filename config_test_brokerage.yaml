# Test Configuration for Brokerage Statement with Large Table
# Designed for synthetic_truist_close_match.pdf (1440 rows across 25 pages)

use_bda: false

# OCR Configuration
ocr:
  backend: textract
  features:
    - name: TABLES
    - name: LAYOUT

# Classification
classification:
  skip: true

# Extraction Configuration
extraction:
  model: "us.anthropic.claude-sonnet-4-20250514-v1:0"
  temperature: 0.0
  max_tokens: 64000

  # Task prompt - explicitly does not use images
  task_prompt: |
    Extract all portfolio holdings from this brokerage statement.

    Document text:
    {DOCUMENT_TEXT}

    Extract into the BrokerageStatement schema.

  # Agentic extraction with adaptive table parsing
  agentic:
    enabled: true
    max_concurrent_batches: 4

    table_parsing:
      enabled: true
      max_empty_line_gap: 3
      auto_merge_adjacent_tables: true
      min_confidence_threshold: 95.0
      min_parse_success_rate: 0.90
      use_confidence_data: true

# Document Schema
classes:
  - $schema: https://json-schema.org/draft/2020-12/schema
    $id: BrokerageStatement
    type: object
    x-aws-idp-document-type: BrokerageStatement
    description: "Brokerage account statement with portfolio holdings"

    properties:
      account_number:
        type: string
        description: "Account number"

      statement_period:
        type: string
        description: "Statement period or date range"

      holdings:
        type: array
        description: "Portfolio holdings detail table"
        items:
          type: object
          properties:
            symbol:
              type: string
              description: "Stock ticker symbol"
            description:
              type: string
              description: "Security description or company name"
            shares:
              type: number
              description: "Number of shares held"
            price:
              type: number
              description: "Current price per share"
            market_value:
              type: number
              description: "Total market value of position"
            gain_loss:
              type: number
              description: "Gain or loss amount"
