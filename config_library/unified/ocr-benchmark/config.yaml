- $schema: https://json-schema.org/draft/2020-12/schema
  $id: BANK_CHECK
  x-aws-idp-document-type: BANK_CHECK
  description: A bank check or cheque document with payee, amount, date, bank info, and account details.
  type: object
  properties:
    checks:
      type: array
      items:
        type: object
        properties:
          bankInfo:
            type: object
            properties:
              bank:
                type: string
                data_type: string
                description: 'Bank name in UPPER_SNAKE_CASE format with underscores replacing spaces. Examples: "BANK_OF_AMERICA", "WELLS_FARGO", "CITIBANK", "CHASE".'
                x-aws-idp-evaluation-method: EXACT
                x-aws-idp-confidence-threshold: '0.8'
          checkInfo:
            type: object
            properties:
              date:
                type: string
                x-aws-idp-evaluation-method: LEVENSHTEIN
                x-aws-idp-evaluation-threshold: '0.7'
                x-aws-idp-confidence-threshold: '0.8'
                data_type: string
              memo:
                type: string
                x-aws-idp-evaluation-method: LEVENSHTEIN
                x-aws-idp-evaluation-threshold: '0.7'
                x-aws-idp-confidence-threshold: '0.8'
                data_type: string
                description: The memo line text on the check. Return null if the memo line is blank or absent.
              micr:
                type: object
                properties:
                  checkNumber:
                    type: integer
                    x-aws-idp-evaluation-method: NUMERIC_EXACT
                    x-aws-idp-confidence-threshold: '0.8'
                    data_type: number
                  accountNumber:
                    type: integer
                    x-aws-idp-evaluation-method: NUMERIC_EXACT
                    x-aws-idp-confidence-threshold: '0.8'
                    data_type: number
                  routingNumber:
                    type: integer
                    x-aws-idp-evaluation-method: NUMERIC_EXACT
                    x-aws-idp-confidence-threshold: '0.8'
                    data_type: number
              payee:
                type: string
                x-aws-idp-evaluation-method: LEVENSHTEIN
                x-aws-idp-evaluation-threshold: '0.7'
                x-aws-idp-confidence-threshold: '0.8'
                data_type: string
              amount:
                type: number
                x-aws-idp-evaluation-method: NUMERIC_EXACT
                x-aws-idp-confidence-threshold: '0.8'
                data_type: number
              amountInWords:
                type: string
                x-aws-idp-evaluation-method: LEVENSHTEIN
                x-aws-idp-evaluation-threshold: '0.7'
                x-aws-idp-confidence-threshold: '0.8'
                data_type: string
          personalInfo:
            type: object
            properties:
              zip:
                type: string
                data_type: string
                x-aws-idp-evaluation-method: EXACT
                x-aws-idp-confidence-threshold: '0.8'
              city:
                type: string
                x-aws-idp-evaluation-method: LEVENSHTEIN
                x-aws-idp-evaluation-threshold: '0.7'
                x-aws-idp-confidence-threshold: '0.8'
                data_type: string
              state:
                type: string
                data_type: string
                x-aws-idp-evaluation-method: EXACT
                x-aws-idp-confidence-threshold: '0.8'
              address:
                type: string
                x-aws-idp-evaluation-method: LEVENSHTEIN
                x-aws-idp-evaluation-threshold: '0.7'
                x-aws-idp-confidence-threshold: '0.8'
                data_type: string
              lastName:
                type: string
                x-aws-idp-evaluation-method: LEVENSHTEIN
                x-aws-idp-evaluation-threshold: '0.7'
                x-aws-idp-confidence-threshold: '0.8'
                data_type: string
              firstName:
                type: string
                x-aws-idp-evaluation-method: LEVENSHTEIN
                x-aws-idp-evaluation-threshold: '0.7'
                x-aws-idp-confidence-threshold: '0.8'
                data_type: string
            description: Personal information of the check writer/payer printed on the check. Extract the name, address, city, state, and zip from the check.
