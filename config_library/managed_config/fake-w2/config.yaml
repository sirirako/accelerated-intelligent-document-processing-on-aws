        x-aws-idp-evaluation-method: NUMERIC_EXACT
      box_18_2_local_wages:
        type: string
        description: "Box 18 - Local wages, tips, etc. (second entry)"
        x-aws-idp-evaluation-method: NUMERIC_EXACT
      box_19_2_local_income_tax:
        type: string
        description: "Box 19 - Local income tax (second entry)"
        x-aws-idp-evaluation-method: NUMERIC_EXACT
      box_20_2_locality:
        type: string
        description: "Box 20 - Locality name (second entry)"
        x-aws-idp-evaluation-method: LEVENSHTEIN
        x-aws-idp-evaluation-threshold: '0.8'
