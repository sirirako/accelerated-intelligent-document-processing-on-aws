# Stack-managed configuration — overwritten on every stack update.
# To customize, use "Save as Version" in the UI to create an editable copy.
managed: true
test_set: "Fake-W2-Tax-Forms"
description: "Managed config for Fake-W2-Tax-Forms test set"
notes: >-
  Fake W-2 Tax Form configuration for evaluating extraction accuracy on synthetic
  US W-2 tax documents. Uses 45 flat ground truth fields matching standard W-2 boxes.
  Source: HuggingFace singhsays/fake-w2-us-tax-form-dataset (CC0: Public Domain).
use_bda: false
assessment:
  enabled: false
summarization:
  enabled: false
rule_validation:
  enabled: false
classes:
  - $schema: https://json-schema.org/draft/2020-12/schema
    $id: W2
    type: object
    description: >-
      US W-2 Wage and Tax Statement - an annual tax document provided by employers
      to employees reporting wages earned and taxes withheld during the tax year.
    x-aws-idp-document-type: W2
    properties:
      box_b_employer_identification_number:
        type: string
        description: "Box b - Employer's federal identification number (EIN)"
        x-aws-idp-evaluation-method: EXACT
      box_c_employer_name:
        type: string
        description: "Box c - Employer's name"
        x-aws-idp-evaluation-method: LEVENSHTEIN
        x-aws-idp-evaluation-threshold: '0.8'
      box_c_employer_street_address:
        type: string
        description: "Box c - Employer's street address"
        x-aws-idp-evaluation-method: LEVENSHTEIN
        x-aws-idp-evaluation-threshold: '0.8'
      box_c_employer_city_state_zip:
        type: string
        description: "Box c - Employer's city, state, and ZIP code"
        x-aws-idp-evaluation-method: LEVENSHTEIN
        x-aws-idp-evaluation-threshold: '0.8'
      box_a_employee_ssn:
        type: string
        description: "Box a - Employee's Social Security Number"
        x-aws-idp-evaluation-method: EXACT
      box_e_employee_name:
        type: string
        description: "Box e - Employee's full name"
        x-aws-idp-evaluation-method: LEVENSHTEIN
        x-aws-idp-evaluation-threshold: '0.8'
      box_e_employee_street_address:
        type: string
        description: "Box f - Employee's street address"
        x-aws-idp-evaluation-method: LEVENSHTEIN
        x-aws-idp-evaluation-threshold: '0.8'
      box_e_employee_city_state_zip:
        type: string
        description: "Box f - Employee's city, state, and ZIP code"
        x-aws-idp-evaluation-method: LEVENSHTEIN
        x-aws-idp-evaluation-threshold: '0.8'
      box_d_control_number:
        type: string
        description: "Box d - Control number assigned by employer"
        x-aws-idp-evaluation-method: EXACT
      box_1_wages:
        type: string
        description: "Box 1 - Wages, tips, other compensation"
        x-aws-idp-evaluation-method: NUMERIC_EXACT
      box_2_federal_tax_withheld:
        type: string
        description: "Box 2 - Federal income tax withheld"
        x-aws-idp-evaluation-method: NUMERIC_EXACT
      box_3_social_security_wages:
        type: string
        description: "Box 3 - Social Security wages"
        x-aws-idp-evaluation-method: NUMERIC_EXACT
      box_4_social_security_tax_withheld:
        type: string
        description: "Box 4 - Social Security tax withheld"
        x-aws-idp-evaluation-method: NUMERIC_EXACT
      box_5_medicare_wages:
        type: string
        description: "Box 5 - Medicare wages and tips"
        x-aws-idp-evaluation-method: NUMERIC_EXACT
      box_6_medicare_wages_tax_withheld:
        type: string
        description: "Box 6 - Medicare tax withheld"
        x-aws-idp-evaluation-method: NUMERIC_EXACT
      box_7_social_security_tips:
        type: string
        description: "Box 7 - Social Security tips"
        x-aws-idp-evaluation-method: NUMERIC_EXACT
      box_8_allocated_tips:
        type: string
        description: "Box 8 - Allocated tips"
        x-aws-idp-evaluation-method: NUMERIC_EXACT
      box_10_dependent_care_benefits:
        type: string
