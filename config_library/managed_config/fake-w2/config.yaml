        x-aws-idp-evaluation-method: EXACT
      box_13_third_part_sick_pay:
        type: string
        description: "Box 13 - Third-party sick pay checkbox (x if checked)"
        x-aws-idp-evaluation-method: EXACT
      box_15_1_state:
        type: string
        description: "Box 15 - State (first entry)"
        x-aws-idp-evaluation-method: EXACT
      box_15_1_employee_state_id:
        type: string
        description: "Box 15 - Employer's state ID number (first entry)"
        x-aws-idp-evaluation-method: EXACT
      box_16_1_state_wages:
        type: string
        description: "Box 16 - State wages, tips, etc. (first entry)"
        x-aws-idp-evaluation-method: NUMERIC_EXACT
      box_17_1_state_income_tax:
        type: string
        description: "Box 17 - State income tax (first entry)"
        x-aws-idp-evaluation-method: NUMERIC_EXACT
      box_18_1_local_wages:
        type: string
        description: "Box 18 - Local wages, tips, etc. (first entry)"
        x-aws-idp-evaluation-method: NUMERIC_EXACT
      box_19_1_local_income_tax:
        type: string
        description: "Box 19 - Local income tax (first entry)"
        x-aws-idp-evaluation-method: NUMERIC_EXACT
      box_20_1_locality:
        type: string
        description: "Box 20 - Locality name (first entry)"
        x-aws-idp-evaluation-method: LEVENSHTEIN
        x-aws-idp-evaluation-threshold: '0.8'
      box_15_2_state:
        type: string
        description: "Box 15 - State (second entry)"
        x-aws-idp-evaluation-method: EXACT
      box_15_2_employee_state_id:
