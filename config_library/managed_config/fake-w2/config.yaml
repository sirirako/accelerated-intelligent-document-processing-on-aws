        x-aws-idp-evaluation-method: EXACT
      box_12a_value:
        type: string
        description: "Box 12a - Amount for the code"
        x-aws-idp-evaluation-method: NUMERIC_EXACT
      box_12b_code:
        type: string
        description: "Box 12b - Code"
        x-aws-idp-evaluation-method: EXACT
      box_12b_value:
        type: string
        description: "Box 12b - Amount for the code"
        x-aws-idp-evaluation-method: NUMERIC_EXACT
      box_12c_code:
        type: string
        description: "Box 12c - Code"
