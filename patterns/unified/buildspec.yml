version: 0.2
phases:
  pre_build:
    commands:
      - echo "Logging into Amazon ECR..."
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_URI
      - echo "Verifying Docker..."
      - docker --version
      - echo "Setting up Docker buildx for cross-platform builds..."
      - docker buildx create --use --name multiarch-builder --driver docker-container || docker buildx use multiarch-builder
      - docker buildx inspect --bootstrap
  build:
    commands:
      - echo "Building Unified Pattern Docker images (BDA + Pipeline)..."
      - echo "Using IMAGE_VERSION from environment (content-based hash)"
      - echo "Image tag will be $IMAGE_VERSION"
      # BDA functions
      - export FUNCTION_bda_invoke="patterns/unified/src/bda_invoke_function"
      - export FUNCTION_bda_completion="patterns/unified/src/bda_completion_function"
      - export FUNCTION_bda_processresults="patterns/unified/src/bda_processresults_function"
      # Pipeline functions
      - export FUNCTION_ocr="patterns/unified/src/ocr_function"
      - export FUNCTION_classification="patterns/unified/src/classification_function"
      - export FUNCTION_extraction="patterns/unified/src/extraction_function"
      - export FUNCTION_assessment="patterns/unified/src/assessment_function"
      - export FUNCTION_processresults="patterns/unified/src/processresults_function"
      - export FUNCTION_summarization="patterns/unified/src/summarization_function"
      - export FUNCTION_evaluation="patterns/unified/src/evaluation_function"
      - export FUNCTION_test_execution_aggregation="patterns/unified/src/test_execution_aggregation_function"
      - export FUNCTION_rule_validation="patterns/unified/src/rule-validation-function"
      - export FUNCTION_rule_validation_orchestration="patterns/unified/src/rule-validation-orchestration-function"
      - |
        for func_var in FUNCTION_bda_invoke FUNCTION_bda_completion FUNCTION_bda_processresults FUNCTION_ocr FUNCTION_classification FUNCTION_extraction FUNCTION_assessment FUNCTION_processresults FUNCTION_summarization FUNCTION_evaluation FUNCTION_test_execution_aggregation FUNCTION_rule_validation FUNCTION_rule_validation_orchestration; do
          func_path="${!func_var}"
          func_name=$(basename "$func_path" | sed 's/_/-/g')
          echo "Building ${func_name} from ${func_path}..."
          docker buildx build \
            --platform linux/arm64 \
            -f Dockerfile.optimized \
            --build-arg FUNCTION_PATH="${func_path}" \
            --tag "${ECR_URI}:${func_name}-${IMAGE_VERSION}" \
            --provenance=false \
            --push \
            .
        done
  post_build:
    commands:
      - echo "All Docker images built and pushed successfully"
      - echo "Images tagged with version ${IMAGE_VERSION}"
